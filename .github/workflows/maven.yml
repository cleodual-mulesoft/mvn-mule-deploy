name: Mule Build and Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          
          # This maps directly to the <id> anypoint-id in your pom.xml
          server-id: "anypoint-id"
          
          # Defines the names of the environment variables Maven will look for
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build Package
        run: mvn clean package

      # Runs your two local commands sequentially in the same shell environment
      # without the debug flags (-X -e)
      - name: Deploy to Exchange and Runtime
        run: |
          mvn deploy
          mvn mule:deploy
        env:
          # Passes your GitHub Repository Secrets into the environment variables
          MAVEN_USERNAME: "~~~Client~~~"
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
